<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Dígito Verificador</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="container">
        <header>
            <h1>Algoritmo de Luhn</h1>
            <p>Ingresa el número de cuenta para ver cómo se obtiene el dígito verificador.</p>
            <div class="input-group">
                <input type="text" id="numeroCuenta" inputmode="numeric" pattern="[0-9\s,-]*" placeholder="Ej: 7992 7398 71, 4111-1111-1111-1111" autocomplete="off">
                <button id="btnGenerar">Generar dígito verificador</button>
            </div>
            <p class="helper-text" id="resumenCuenta">Puedes ingresar varios números separados por comas.</p>
            <p id="error-message" class="error-message" aria-live="polite"></p>
        </header>

        <section class="steps-container" id="pasosGenerados" style="display: none;"></section>

        <footer class="result-container" id="resultadoFinal" style="display: none;"></footer>
    </main>

    <script src="app.js"></script>
</body>
</html>
