<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algoritmo de Luhn</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <header>
        <h1>Algoritmo de Luhn</h1>
        <p>Ingrese el número para generar el dígito verificador:</p>
        <div class="input-group">
            <input type="text" id="accountNumber" placeholder="Ej. 7992739871" autocomplete="off">
            <button onclick="procesarLuhn()">Generar Dígito Verificador</button>
        </div>
    </header>

    <div class="steps-container" id="stepsContainer" style="display: none;">
        
        <div class="step-box">
            <h2>1. DÍGITOS DEL NÚMERO DE CUENTA</h2>
            <div class="grid-numbers" id="gridStep1"></div>
        </div>

        <div class="step-box">
            <h2>2. DUPLICAR DÍGITOS PARES</h2>
            <div class="grid-numbers" id="gridStep2"></div>
        </div>

        <div class="step-box">
            <h2>3. SUMAR LOS DÍGITOS</h2>
            <div class="grid-numbers" id="gridStep3"></div>
        </div>

        <div class="result-container">
            <p>Dígito Verificador: <span class="final-digit" id="finalDigit">?</span></p>
        </div>

    </div>
</div>

<script src="app.js"></script>
</body>
</html>
