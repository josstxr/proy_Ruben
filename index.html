<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Dígito Verificador</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="container">
        <header>
            <h1>Algoritmo de Luhn</h1>
            <p>Ingrese el número para generar el dígito verificador:</p>
            <div class="input-group">
                <input type="text" id="numeroCuenta" placeholder="Ej: 7992739871" autocomplete="off">
                <button id="btnGenerar">Generar Dígito Verificador</button>
            </div>
            <p id="error-message" style="color: #e53e3e; margin-top: 10px; display: none; font-weight: bold;"></p>
        </header>

        <section class="steps-container" id="pasosGenerados" style="display: none;"></section>

        <footer class="result-container" id="resultadoFinal" style="display: none;"></footer>
    </main>

    <script src="app.js"></script>
</body>
</html>
